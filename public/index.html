<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="e-mail temporário, forsaken mail, disposable mail, brightads">
  <title>BrightAds - E-mail Temporário</title>
  <link href="https://lib.baomitu.com/semantic-ui/2.1.7/semantic.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/prism.css">
</head>
<body>
<div class="ui fixed borderless menu">
  <div class="ui text container" style="max-width: 100% !important;">
    <div href="#" class="header item">
      <img class="logo" src="//semantic-ui.com/examples/assets/images/logo.png" alt="logo">
      BrightAds Mail
    </div>
    <div class="ui label item right floated mailaddress" style="width: 45%;">
      <button class="ui icon button" title="Copiar E-mail">
        <i class="mail icon copyable"></i>
      </button>
      <div class="ui icon input">
        <input id="shortid" type="text" placeholder="Aguardando e-mail..." disabled>
        <i id="refreshShortid" title="Gerar novo e-mail" class="circular refresh link icon"></i>
      </div>
      <i id="customShortid" style="margin-left:0.5em" title="Customizar endereço" class="circular edit link icon"></i>
    </div>
  </div>
</div>
<div class="ui main container">
  <div class="ui grid">
    <div class="row">
      <div class="column">
        <table class="ui celled selectable table">
          <thead>
          <tr>
            <th>Remetente</th>
            <th>Assunto</th>
            <th>Data/Hora</th>
          </tr>
          </thead>
          <tbody id="maillist">
          </tbody>
        </table>
      </div>
    </div>
    <div class="row">
      <div class="column">
        <div class="ui card" id="mailcard" style="width: 100%;">
          <div class="content">
            <i class="code icon right floated"></i>
            <div class="header">Conteúdo do E-mail</div>
          </div>
          <div class="content">
            <p>Selecione um e-mail na lista acima para ler o conteúdo aqui. ( ͡° ͜ʖ ͡°) </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="ui modal" id="raw">
  <div class="header">E-mail Original (Raw)</div>
  <div class="content"></div>
</div>

<script src="https://lib.baomitu.com/jquery/2.1.4/jquery.min.js"></script>
<script src="https://lib.baomitu.com/semantic-ui/2.1.7/semantic.min.js"></script>
<script src="https://lib.baomitu.com/socket.io/1.3.7/socket.io.min.js"></script>
<script src="https://lib.baomitu.com/clipboard.js/1.5.5/clipboard.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/prism.js"></script>
</body>
</html>
